---
layout: default
title: Poems
---

<div class="content-wide">
  <h2>Poems</h2>
  <dl class="dl-horizontal">
    {% assign poems = site.poems | reverse %} {% assign prev_year = 0 %} {% for
    poem in poems %} {% if prev_year != poem.year %}
    <dt>{{poem.year}}</dt>
    {% assign prev_year = poem.year %} {% endif %}
    <dd><a href="{{site.baseurl}}{{poem.url}}">{{poem.title}}</a></dd>
    {% endfor %}
  </dl>
</div>
